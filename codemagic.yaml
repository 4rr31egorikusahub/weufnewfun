workflows:
  ios-custom-build:
    name: Build Telegram iOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    
    # Кэшируем папки Bazel между сборками, чтобы повторные билды занимали пару минут
    cache:
      cache_paths:
        - $HOME/telegram-bazel-cache

    scripts:
      - name: Fetch submodules
        script: |
          git submodule update --init --recursive

      - name: Prepare build environment
        script: |
          # Создаем папку для загрузки бинарников Bazel и папку для кэша
          mkdir -p build-input
          mkdir -p $HOME/telegram-bazel-cache

      - name: Build App with Bazel
        script: |
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --overrideBazelVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --buildNumber 1 \
            --configuration release_arm64 \
            --configurationPath build-system/appstore-configuration.json \
            --xcodeManagedCodesigning

    artifacts:
      - bazel-bin/Telegram/Telegram.ipa
      - bazel-bin/Telegram/Telegram.app
