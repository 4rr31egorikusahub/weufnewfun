workflows:
  ios-custom-build:
    name: Build Telegram iOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/telegram-bazel-cache

    scripts:
      - name: Fetch submodules
        script: |
          git submodule update --init --recursive

      - name: Prepare build environment
        script: |
          mkdir -p build-input
          mkdir -p $HOME/telegram-bazel-cache

      - name: Generate Local Provisioning & Build App
        script: |
          # 1. Генерируем конфиг, отключая требования профилей и все расширения
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --overrideBazelVersion \
            generateProject \
            --configurationPath build-system/appstore-configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles \
            --disableExtensions

          # 2. Собираем только основной клиент, игнорируя расширения
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --overrideBazelVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --buildNumber 1 \
            --configuration release_arm64 \
            --configurationPath build-system/appstore-configuration.json \
            --xcodeManagedCodesigning \
            --disableExtensions

    artifacts:
      - bazel-bin/Telegram/Telegram.ipa
      - bazel-bin/Telegram/Telegram.app
